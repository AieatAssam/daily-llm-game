<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Pop - Daily Game 2026-03-05</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>🫧 Bubble Pop</h1>
            <p class="instructions">Click the bubbles before they float away! Don't let any escape.</p>
        </header>
        
        <div class="stats">
            <div class="stat">
                <span class="stat-label">Score</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Missed</span>
                <span class="stat-value" id="missed">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Time</span>
                <span class="stat-value" id="timer">60</span>
            </div>
        </div>
        
        <div class="game-area" id="game-area">
            <!-- Bubbles spawn here -->
        </div>
        
        <div class="controls">
            <button id="start-btn" class="btn primary">Start Game</button>
            <button id="pause-btn" class="btn secondary" disabled>Pause</button>
        </div>
        
        <div class="game-over" id="game-over" style="display: none;">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="final-score">0</span></p>
            <p>Bubbles Missed: <span id="final-missed">0</span></p>
            <button id="restart-btn" class="btn primary">Play Again</button>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
